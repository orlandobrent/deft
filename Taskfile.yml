version: '3'

includes:
  deployments:
    taskfile: ./taskfiles/deployments.yml
    optional: true

vars:
  PROJECT_NAME: deft
  VERSION: 0.3.0

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true

  validate:
    desc: Validate all markdown files
    cmds:
      - echo "Validating markdown files..."
      - find . -name "*.md" -not -path "./backup/*" -not -path "./.git/*" | xargs -I {} sh -c 'echo "✓ {}"'
      - echo "✓ All markdown files validated"

  lint:
    desc: Lint markdown files (requires markdownlint-cli)
    cmds:
      - |
        if command -v markdownlint >/dev/null 2>&1; then
          markdownlint '**/*.md' --ignore backup --ignore node_modules
        else
          echo "⚠ markdownlint not installed. Install with: npm install -g markdownlint-cli"
          exit 0
        fi

  check:
    desc: Run all pre-commit checks
    deps:
      - validate
    cmds:
      - echo "✓ All checks passed"

  build:
    desc: Package framework for distribution
    cmds:
      - mkdir -p dist
      - tar -czf dist/deft-{{.VERSION}}.tar.gz --exclude=backup --exclude=dist --exclude=.git --exclude=node_modules .
      - echo "✓ Created dist/deft-{{.VERSION}}.tar.gz"

  clean:
    desc: Clean generated artifacts
    cmds:
      - rm -rf dist/
      - echo "✓ Cleaned artifacts"

  install:
    desc: Install deft CLI to /usr/local/bin
    cmds:
      - |
        if [ -w /usr/local/bin ]; then
          ln -sf "$(pwd)/deft.sh" /usr/local/bin/deft
          echo "✓ Installed deft to /usr/local/bin/deft"
        else
          echo "⚠ Need sudo access to install to /usr/local/bin"
          sudo ln -sf "$(pwd)/deft.sh" /usr/local/bin/deft
          echo "✓ Installed deft to /usr/local/bin/deft"
        fi

  uninstall:
    desc: Uninstall deft CLI from /usr/local/bin
    cmds:
      - |
        if [ -L /usr/local/bin/deft ]; then
          rm /usr/local/bin/deft
          echo "✓ Uninstalled deft from /usr/local/bin"
        else
          echo "deft not installed in /usr/local/bin"
        fi

  spec:validate:
    desc: Validate that vbrief/specification.vbrief.json exists and is well-formed JSON
    cmds:
      - |
        SPEC_FILE="{{.USER_WORKING_DIR}}/vbrief/specification.vbrief.json"
        if [ ! -f "$SPEC_FILE" ]; then
          echo "✗ vbrief/specification.vbrief.json not found"
          echo "  Create it by running the interview process (see deft/templates/make-spec.md)"
          exit 1
        fi
        if ! python3 -c "import json, sys; json.load(open('$SPEC_FILE'))" 2>/dev/null; then
          echo "✗ vbrief/specification.vbrief.json is not valid JSON"
          exit 1
        fi
        echo "✓ vbrief/specification.vbrief.json is valid"

  spec:render:
    desc: Render vbrief/specification.vbrief.json to SPECIFICATION.md
    deps:
      - spec:validate
    cmds:
      - |
        SPEC_FILE="{{.USER_WORKING_DIR}}/vbrief/specification.vbrief.json"
        OUT_FILE="{{.USER_WORKING_DIR}}/SPECIFICATION.md"
        STATUS=$(python3 -c "import json; d=json.load(open('$SPEC_FILE')); print(d.get('status',''))" 2>/dev/null)
        if [ "$STATUS" != "approved" ]; then
          echo "⚠ specification.vbrief.json status is '$STATUS' (expected 'approved')"
          echo "  Have the user review and set status to 'approved' before rendering."
          exit 1
        fi
        python3 - <<'EOF'
        import json, sys
        with open("$SPEC_FILE") as f:
            spec = json.load(f)
        lines = []
        title = spec.get("title", spec.get("plan", "Specification"))
        lines.append(f"# {title}\n")
        if overview := spec.get("overview") or spec.get("description"):
            lines.append(f"{overview}\n")
        for task in spec.get("tasks", []):
            task_id = task.get("id", "")
            do = task.get("do", task.get("title", ""))
            status = task.get("status", "")
            lines.append(f"## {task_id}: {do}  \`[{status}]\`\n")
            for key in ("narrative", "acceptance", "why"):
                if val := task.get(key):
                    if isinstance(val, list):
                        for item in val:
                            lines.append(f"- {item}")
                        lines.append("")
                    else:
                        lines.append(f"{val}\n")
        with open("$OUT_FILE", "w") as f:
            f.write("\n".join(lines))
        EOF
        echo "✓ Rendered to SPECIFICATION.md"

  stats:
    desc: Show framework statistics
    cmds:
      - |
        echo "Deft Framework v{{.VERSION}} Statistics:"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "Core files:      $(find core -name '*.md' | wc -l | tr -d ' ')"
        echo "Languages:       $(find languages -name '*.md' | wc -l | tr -d ' ')"
        echo "Interfaces:      $(find interfaces -name '*.md' | wc -l | tr -d ' ')"
        echo "Tools:           $(find tools -name '*.md' | wc -l | tr -d ' ')"
        echo "Templates:       $(find templates -name '*.md' | wc -l | tr -d ' ')"
        echo "Total files:     $(find . -name '*.md' -not -path './backup/*' -not -path './.git/*' | wc -l | tr -d ' ')"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
