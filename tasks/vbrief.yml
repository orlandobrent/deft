version: '3'

tasks:
  validate:
    desc: Validate vBRIEF lifecycle folder structure and cross-file consistency
    dir: '{{.USER_WORKING_DIR}}'
    env:
      PYTHONUTF8: "1"
    cmds:
      - uv run python {{.TASKFILE_DIR}}/../scripts/vbrief_validate.py --vbrief-dir "{{.USER_WORKING_DIR}}/vbrief"
